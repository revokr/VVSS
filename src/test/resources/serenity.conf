EXT_PATH=$(realpath ~/.jenkins/workspace/VVSS-Lab05-WebTesting/src/test/resources/basic-auth-extension)

cat > ~/.jenkins/workspace/VVSS-Lab05-WebTesting/src/test/resources/serenity.conf << EOF
serenity.project.name = "LabWebFTP - Serenity BDD Tests"

webdriver.driver = chrome
webdriver.autodownload = true

# Old headless mode (supports extensions, unlike --headless=new)
# Extension auto-injects HTTP Basic Auth for scs.ubbcluj.ro
chrome.switches = "--headless;--disable-gpu;--no-sandbox;--window-size=1920,1080;--remote-allow-origins=*;--disable-extensions-except=${EXT_PATH};--load-extension=${EXT_PATH}"

headless.mode = false

webdriver.timeouts.implicitlywait = 5000
serenity.timeout = 10000
serenity.take.screenshots = AFTER_EACH_STEP
serenity.restart.browser.for.each = scenario
EOF