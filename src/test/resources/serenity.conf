serenity.project.name = "LabWebFTP - Serenity BDD Tests"

webdriver.driver = chrome
webdriver.autodownload = true

chrome.switches = "--headless=new;--disable-gpu;--no-sandbox;--window-size=1920,1080;--remote-allow-origins=*"

headless.mode = false

webdriver.timeouts.implicitlywait = 5000
serenity.timeout = 10000
serenity.take.screenshots = AFTER_EACH_STEP
serenity.restart.browser.for.each = scenario