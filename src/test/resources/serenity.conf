serenity.project.name = "LabWebFTP - Serenity BDD Tests"

webdriver {
    driver = chrome
    autodownload = true
    capabilities {
        acceptInsecureCerts = true
        "goog:chromeOptions" {
            args = ["--headless=new", "--disable-gpu", "--no-sandbox", "--window-size=1920,1080"]
        }
    }
}

# Turn OFF Serenity's auto-headless — we set the flag ourselves above
headless.mode = false

webdriver.timeouts.implicitlywait = 5000
serenity.timeout = 10000
serenity.take.screenshots = AFTER_EACH_STEP
serenity.restart.browser.for.each = scenario