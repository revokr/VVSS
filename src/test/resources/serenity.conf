# Appears at the top of the Serenity reports
serenity.project.name = "LabWebFTP - Serenity BDD Tests"

# Driver selection
webdriver {
    driver = chrome
    autodownload = true

    capabilities {
        browserName = "chrome"
        acceptInsecureCerts = true
        pageLoadStrategy = "normal"

        "goog:chromeOptions" {
            args = [
                "headless=new",
                "disable-gpu",
                "no-sandbox",
                "disable-dev-shm-usage",
                "remote-allow-origins=*",
                "window-size=1920,1080",
                "disable-extensions"
            ]
        }
    }
}

# Headless toggle — overridden by -Dheadless.mode=false from command line or pom profile
headless.mode = true

# Timeouts (milliseconds)
webdriver.timeouts.implicitlywait = 5000
serenity.timeout = 10000

# Take screenshots only on failure to keep reports small
serenity.take.screenshots = AFTER_EACH_STEP

# Restart the browser between tests for isolation
serenity.restart.browser.for.each = scenario

environments {
    default {
        webdriver.base.url = "http://localhost:8080"
    }
    local {
        webdriver.base.url = "http://localhost:8080"
    }
}