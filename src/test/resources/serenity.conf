serenity {
  project.name = "LabWebFTP - Serenity BDD Tests"
  test.root = "webFTP.features"
  timeout = 10000
  take.screenshots = AFTER_EACH_STEP
  restart.browser.for.each = scenario
}

webdriver {
  driver = chrome
  autodownload = true
  timeouts {
    implicitlywait = 5000
  }
}

headless.mode = false

chrome {
  switches = "--headless=new;--disable-gpu;--no-sandbox;--window-size=1920,1080;--remote-allow-origins=*;--disable-extensions-except=${user.dir}/src/test/resources/basic-auth-extension;--load-extension=${user.dir}/src/test/resources/basic-auth-extension"
}